services:
  db:
    image: library/postgres:14
    container_name: postgres-service-db
    restart: on-failure
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - 5433:5432
    deploy:
      resources:
        limits:
          memory: 512M
  bot:
    build: .
    container_name: telegram_bot
    restart: unless-stopped
    environment:
      - TG_KEY=${TELEGRAM_API_KEY}
      - DB_URL=postgresql://${POSTGRESQL_USER}:${POSTGRESQL_PASSWORD}@${POSTGRESQL_HOST}:${POSTGRESQL_PORT}/${POSTGRESQL_DBNAME}
      - BOT_URL=${BOT_URL}
    volumes:
      - ./uploads:/app/uploads
      - ./myinstants_sounds:/app/myinstants_sounds
      - ./videos:/app/videos
      - ./results:/app/results
    depends_on:
      - db
      - redis
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  redis_data:
  db:
